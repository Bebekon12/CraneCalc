version: "3.8"

services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: rootroot
      MINIO_ROOT_PASSWORD: rootroot
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set myminio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do
        echo 'Ожидание MinIO...';
        sleep 2;
      done;
      /usr/bin/mc mb --ignore-existing myminio/images;
      /usr/bin/mc anonymous set public myminio/images;
      echo 'Бакет images создан и настроен';
      "
    environment:
      - MINIO_ROOT_USER=rootroot
      - MINIO_ROOT_PASSWORD=rootroot

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: CartCalc4
      POSTGRES_USER: Bebekon
      POSTGRES_PASSWORD: 123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Bebekon -d CartCalc4"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redispassword
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispassword", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    ports:
      - "8085:8085"
    depends_on:
      - postgres

  crane-calc:
    build: 
      context: .
      dockerfile: ./CraneCalc.API/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=CartCalc4;User Id=Bebekon;Password=123;
      - ConnectionStrings__Redis=redis:6379,password=redispassword
      - Minio__Endpoint=minio:9000
      - Minio__AccessKey=rootroot
      - Minio__SecretKey=rootroot
      - Minio__BucketName=images
      - Minio__UseSSL=false
      - JwtOptions__SecretKey=ahdahudhahdoahwwohdauhdoahdoaudhoudhoawhdouhawodawhdaod
      - JwtOptions__ExpiresHours=12
      - AdminUser=bebekon
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

volumes:
  minio-data:
  postgres-data:
  redis-data: